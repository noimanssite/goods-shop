<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>결제하기 · 굿즈샵</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="theme-color" content="#3182f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="turingshop">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
</head>
<body>
  <header class="app-header">
    <a href="index.html" class="logo">굿즈샵</a>
    <nav id="nav-auth"></nav>
  </header>
  <main class="main-narrow">
    <div class="page-head">
      <h1>결제하기</h1>
      <p class="sub">선택하신 상품의 결제를 진행합니다.</p>
    </div>
    <div id="product-info"></div>
    <h2 style="font-size:var(--font-lg);margin-bottom:var(--space-3)">결제 수단</h2>
    <div id="payment-method"></div>
    <div id="agreement"></div>
    <button id="pay-btn" class="btn btn-block" disabled style="margin-top:var(--space-4)">결제하기</button>
    <div id="error" class="alert" hidden style="margin-top:var(--space-3)"></div>
  </main>
  <script src="https://js.tosspayments.com/v2/standard"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/format.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/checkout.js"></script>
  <script src="js/sw-register.js"></script>
  <script src="js/install-prompt.js"></script>
</body>
</html>
