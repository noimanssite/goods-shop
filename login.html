<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>로그인 · 굿즈샵</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="theme-color" content="#3182f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="turingshop">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
</head>
<body>
  <main class="main-narrow">
    <div class="auth-card">
      <div class="auth-brand">
        <a href="index.html" class="auth-logo">굿즈샵</a>
        <p>일상을 채우는 작은 선택</p>
      </div>

      <div class="segmented" role="tablist">
        <button type="button" class="seg-btn is-active" id="tab-signin" role="tab" aria-selected="true">로그인</button>
        <button type="button" class="seg-btn" id="tab-signup" role="tab" aria-selected="false">회원가입</button>
      </div>

      <form id="auth-form" class="form-group" novalidate>
        <input type="email" name="email" required placeholder="이메일" autocomplete="email">
        <input type="password" name="password" required minlength="6" placeholder="비밀번호 (6자 이상)" autocomplete="current-password">
        <button type="submit" class="btn btn-block" id="submit-btn">로그인</button>
      </form>

      <div id="message" class="alert" hidden></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/format.js"></script>
  <script src="js/login.js"></script>
  <script src="js/sw-register.js"></script>
  <script src="js/install-prompt.js"></script>
</body>
</html>
