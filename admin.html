<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>관리자 · 전체 결제 내역</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="theme-color" content="#3182f6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="turingshop">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
</head>
<body>
  <header class="app-header">
    <a href="index.html" class="logo">굿즈샵</a>
    <nav id="nav-auth"></nav>
  </header>
  <main>
    <div class="page-head">
      <h1>전체 결제 내역</h1>
      <p class="sub">관리자만 볼 수 있는 화면입니다.</p>
    </div>
    <div id="status">불러오는 중...</div>
    <p id="summary" hidden></p>
    <table class="table" id="orders-table" hidden>
      <thead>
        <tr>
          <th>주문번호</th>
          <th>구매자</th>
          <th>상품명</th>
          <th>금액</th>
          <th>결제일시</th>
        </tr>
      </thead>
      <tbody id="orders-body"></tbody>
    </table>
    <div class="empty-state" id="empty" hidden>결제 내역이 없습니다.</div>
    <div class="alert" id="forbidden" hidden>관리자 권한이 필요합니다.</div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/format.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/sw-register.js"></script>
  <script src="js/install-prompt.js"></script>
</body>
</html>
